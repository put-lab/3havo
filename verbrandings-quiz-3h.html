<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verbrandingsreacties Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4ff;
  --card: #ffffff;
  --flame: #e8470a;
  --flame2: #f5a623;
  --blue: #1d6ef5;
  --blue2: #38bdf8;
  --smoke: #374151;
  --text: #111827;
  --muted: #6b7280;
  --border: #c7d2e8;
  --correct: #15803d;
  --correct-bg: #dcfce7;
  --wrong: #b91c1c;
  --wrong-bg: #fee2e2;
  --incomplete-accent: #6d28d9;
  --shadow: 0 4px 20px rgba(0,0,0,0.10);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 0 0 60px;
  font-size: 22px;
}

/* ── Header ── */
.hero {
  background: linear-gradient(160deg, #070d1f 0%, #0a1a3a 40%, #0c0600 100%);
  padding: 44px 24px 40px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 30% 100%, rgba(232,71,10,0.35) 0%, transparent 55%),
    radial-gradient(ellipse at 70% 100%, rgba(29,110,245,0.35) 0%, transparent 55%);
}

/* ── Blue flame SVG ── */
.flames {
  position: relative;
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 12px;
  height: 72px;
}

.flame-svg {
  width: 44px;
  height: 72px;
  transform-origin: bottom center;
}

.flame-svg.orange { animation: flicker-o 1.6s ease-in-out infinite alternate; }
.flame-svg.blue   { animation: flicker-b 1.9s ease-in-out infinite alternate; }
.flame-svg.small  { width: 30px; height: 52px; animation: flicker-s 1.4s ease-in-out infinite alternate; }

@keyframes flicker-o {
  0%   { transform: scaleY(1) rotate(-2deg) scaleX(0.95); }
  100% { transform: scaleY(1.1) rotate(2deg) scaleX(1.05); }
}
@keyframes flicker-b {
  0%   { transform: scaleY(1.05) rotate(1.5deg) scaleX(1); }
  100% { transform: scaleY(0.92) rotate(-2deg) scaleX(0.96); }
}
@keyframes flicker-s {
  0%   { transform: scaleY(0.9) rotate(2deg); opacity: 0.85; }
  100% { transform: scaleY(1.08) rotate(-1deg); opacity: 1; }
}

.hero h1 {
  font-size: 2.4rem;
  font-weight: 900;
  color: #fff;
  position: relative;
  letter-spacing: -0.5px;
  line-height: 1.1;
}

.hero h1 span { color: var(--flame2); }

.hero p {
  color: rgba(255,255,255,0.65);
  font-size: 1.1rem;
  margin-top: 10px;
  position: relative;
}

/* ── Phase tabs ── */
.phase-bar {
  display: flex;
  max-width: 780px;
  margin: 0 auto;
  border-bottom: 3px solid var(--border);
  background: var(--card);
  padding: 0 20px;
}

.phase-tab {
  flex: 1;
  padding: 16px 8px;
  font-family: 'Outfit', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  border: none;
  background: transparent;
  cursor: pointer;
  color: var(--muted);
  border-bottom: 4px solid transparent;
  margin-bottom: -3px;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.phase-tab.active { color: var(--flame); border-bottom-color: var(--flame); }
.phase-tab.done   { color: var(--correct); }

/* ── Main content ── */
.main {
  max-width: 780px;
  margin: 0 auto;
  padding: 28px 20px;
}

/* ── Progress ── */
.progress-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
  font-size: 1rem;
  font-family: 'JetBrains Mono', monospace;
  color: var(--smoke);
  font-weight: 600;
}

.progress-track {
  height: 8px;
  background: var(--border);
  border-radius: 4px;
  margin-bottom: 24px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--flame), var(--flame2));
  border-radius: 4px;
  transition: width 0.5s ease;
}

/* ── Question card ── */
.q-card {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 20px;
  padding: 30px;
  box-shadow: var(--shadow);
  margin-bottom: 24px;
}

.q-type-label {
  font-size: 0.85rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 2.5px;
  color: var(--flame);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.q-type-label.incomplete { color: var(--incomplete-accent); }

/* ── Equation display ── */
.equation-wrap {
  background: #060e22;
  border-radius: 14px;
  padding: 28px 20px;
  margin-bottom: 28px;
  overflow-x: auto;
  border: 2px solid #1e3a6e;
}

.equation {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  flex-wrap: wrap;
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.7rem;
  color: #fff;
}

.eq-term {
  display: flex;
  align-items: baseline;
  gap: 3px;
}

.eq-coeff {
  font-size: 1.7rem;
  font-weight: 700;
}

.eq-coeff.blank {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 46px;
  height: 42px;
  background: rgba(56,189,248,0.12);
  border: 2px dashed var(--blue2);
  border-radius: 8px;
  color: var(--blue2);
  font-size: 1.4rem;
  padding: 0 10px;
}

.eq-coeff.blank.answered-pending {
  background: rgba(245,166,35,0.2);
  border-color: var(--flame2);
  border-style: solid;
  color: var(--flame2);
}

.eq-coeff.blank.answered-correct {
  background: rgba(21,128,61,0.25);
  border-color: #22c55e;
  border-style: solid;
  color: #22c55e;
}

.eq-coeff.blank.answered-wrong {
  background: rgba(185,28,28,0.25);
  border-color: #f87171;
  border-style: solid;
  color: #f87171;
}

.eq-formula {
  font-size: 1.5rem;
  color: rgba(255,255,255,0.9);
}

.eq-formula sub { font-size: 0.62em; }

.eq-arrow {
  color: var(--flame2);
  font-size: 1.8rem;
  padding: 0 6px;
  font-weight: 700;
}

.eq-plus {
  color: rgba(255,255,255,0.45);
  font-size: 1.5rem;
}

/* ── Instruction ── */
.q-instruction {
  font-size: 1rem;
  color: var(--smoke);
  margin-bottom: 20px;
  line-height: 1.6;
}

/* ── Choices grid ── */
.choices-group {
  margin-bottom: 20px;
  background: #f8faff;
  border-radius: 12px;
  padding: 14px 16px;
  border: 1.5px solid var(--border);
}

.choices-label {
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--smoke);
  margin-bottom: 10px;
  font-family: 'JetBrains Mono', monospace;
}

.choices {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.choice-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.2rem;
  font-weight: 700;
  padding: 12px 26px;
  border-radius: 10px;
  border: 2px solid var(--border);
  background: #fff;
  color: var(--text);
  cursor: pointer;
  transition: all 0.15s;
  min-width: 62px;
  text-align: center;
}

.choice-btn:hover:not(:disabled) {
  border-color: var(--blue);
  background: #eff6ff;
  color: var(--blue);
}

.choice-btn.selected {
  background: #eff6ff;
  border-color: var(--blue);
  color: var(--blue);
  box-shadow: 0 0 0 3px rgba(29,110,245,0.15);
}

.choice-btn.correct {
  background: var(--correct-bg);
  border-color: var(--correct);
  color: var(--correct);
  font-weight: 800;
}

.choice-btn.wrong {
  background: var(--wrong-bg);
  border-color: var(--wrong);
  color: var(--wrong);
}

.choice-btn:disabled { cursor: default; }

/* ── Check button ── */
.check-btn {
  font-family: 'Outfit', sans-serif;
  font-size: 1.15rem;
  font-weight: 800;
  padding: 14px 36px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, var(--flame), var(--flame2));
  color: white;
  cursor: pointer;
  margin-top: 8px;
  margin-bottom: 14px;
  transition: all 0.15s;
  box-shadow: 0 4px 16px rgba(232,71,10,0.35);
  letter-spacing: 0.3px;
}

.check-btn:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(232,71,10,0.45);
}

.check-btn:disabled {
  background: var(--border);
  color: var(--muted);
  cursor: default;
  box-shadow: none;
  transform: none;
}

/* ── Feedback ── */
.feedback-bar {
  min-height: 32px;
  font-size: 1.05rem;
  font-weight: 700;
  padding: 8px 0;
  color: transparent;
  transition: color 0.2s;
  line-height: 1.4;
}

.feedback-bar.correct { color: var(--correct); }
.feedback-bar.wrong   { color: var(--wrong); }

/* ── Uitleg box ── */
.uitleg {
  display: none;
  background: #eff6ff;
  border: 2px solid #93c5fd;
  border-radius: 12px;
  padding: 16px 20px;
  font-size: 1rem;
  color: #1e3a8a;
  line-height: 1.7;
  margin-top: 12px;
  font-family: 'JetBrains Mono', monospace;
}

.uitleg.show { display: block; }
.uitleg strong { color: var(--blue); }

/* ── Nav ── */
.nav-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 4px;
}

.nav-btn {
  font-family: 'Outfit', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  padding: 12px 28px;
  border-radius: 30px;
  border: 2px solid var(--border);
  background: var(--card);
  color: var(--text);
  cursor: pointer;
  transition: all 0.15s;
}

.nav-btn:hover { border-color: var(--blue); color: var(--blue); }
.nav-btn:disabled { opacity: 0.3; cursor: default; }

.nav-btn.primary {
  background: linear-gradient(135deg, var(--blue), #0ea5e9);
  color: white;
  border-color: transparent;
  box-shadow: 0 4px 14px rgba(29,110,245,0.35);
}

.nav-btn.primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 18px rgba(29,110,245,0.45);
}

/* ── Score screen ── */
.score-screen {
  display: none;
  text-align: center;
  padding: 48px 20px;
}

.score-screen.show { display: block; }

.score-circle {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--flame), var(--flame2));
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin: 0 auto 24px;
  box-shadow: 0 10px 40px rgba(232,71,10,0.35);
}

.score-big {
  font-size: 2.8rem;
  font-weight: 900;
  color: white;
  line-height: 1;
  font-family: 'JetBrains Mono', monospace;
}

.score-sub { color: rgba(255,255,255,0.8); font-size: 0.9rem; }

.score-title {
  font-size: 1.7rem;
  font-weight: 900;
  margin-bottom: 10px;
}

.score-msg {
  color: var(--smoke);
  font-size: 1.05rem;
  margin-bottom: 32px;
}

.score-breakdown {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 24px;
  text-align: left;
}

.breakdown-row {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  font-size: 1rem;
  border-bottom: 1px solid var(--border);
}

.breakdown-row:last-child { border-bottom: none; }

.restart-btn {
  background: linear-gradient(135deg, var(--flame), var(--flame2));
  color: white;
  font-family: 'Outfit', sans-serif;
  font-size: 1.1rem;
  font-weight: 800;
  padding: 16px 48px;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  box-shadow: 0 6px 20px rgba(232,71,10,0.35);
}

/* ── Name screen ── */
#name-screen {
  max-width: 780px;
  margin: 0 auto;
  padding: 48px 20px;
  text-align: center;
}

.name-card {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 20px;
  padding: 40px 36px;
  box-shadow: var(--shadow);
  display: inline-block;
  width: 100%;
  max-width: 480px;
}

.name-card h2 {
  font-size: 1.6rem;
  font-weight: 900;
  margin-bottom: 8px;
}

.name-card p {
  color: var(--smoke);
  font-size: 1rem;
  margin-bottom: 28px;
}

.name-input {
  width: 100%;
  font-family: 'Outfit', sans-serif;
  font-size: 1.3rem;
  font-weight: 600;
  padding: 14px 20px;
  border: 2px solid var(--border);
  border-radius: 12px;
  outline: none;
  color: var(--text);
  background: var(--bg);
  margin-bottom: 16px;
  transition: border-color 0.15s;
}

.name-input:focus { border-color: var(--blue); }

.start-btn {
  width: 100%;
  font-family: 'Outfit', sans-serif;
  font-size: 1.2rem;
  font-weight: 800;
  padding: 16px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--blue), #0ea5e9);
  color: white;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(29,110,245,0.35);
  transition: all 0.15s;
}

.start-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(29,110,245,0.45); }
.start-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

/* ── Leaderboard ── */
.leaderboard {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 20px;
  padding: 28px;
  margin-top: 28px;
  text-align: left;
  box-shadow: var(--shadow);
}

.leaderboard h3 {
  font-size: 1.2rem;
  font-weight: 900;
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.lb-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 12px;
  border-radius: 10px;
  margin-bottom: 6px;
  font-size: 1rem;
  transition: background 0.1s;
}

.lb-row:nth-child(odd) { background: var(--bg); }

.lb-rank {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 1rem;
  width: 28px;
  text-align: center;
  color: var(--muted);
}

.lb-row.gold   .lb-rank { color: #d97706; }
.lb-row.silver .lb-rank { color: #6b7280; }
.lb-row.bronze .lb-rank { color: #92400e; }

.lb-name {
  flex: 1;
  font-weight: 700;
}

.lb-name.me { color: var(--blue); }

.lb-score {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 1rem;
  color: var(--smoke);
}

.lb-pct {
  font-size: 0.85rem;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  min-width: 44px;
  text-align: right;
}

.lb-empty {
  color: var(--muted);
  font-size: 0.95rem;
  padding: 12px 0;
  text-align: center;
}

.lb-clear {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 0.8rem;
  padding: 5px 12px;
  border-radius: 6px;
  cursor: pointer;
  margin-top: 12px;
  font-family: 'Outfit', sans-serif;
}

.lb-clear:hover { color: var(--wrong); border-color: var(--wrong); }
.phase-intro {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 20px;
  padding: 28px;
  margin-bottom: 24px;
  text-align: center;
}

.phase-intro h2 { font-size: 1.5rem; font-weight: 900; margin-bottom: 10px; }
.phase-intro p  { color: var(--smoke); font-size: 1rem; line-height: 1.7; }
.phase-intro .rule-box {
  background: #060e22;
  border-radius: 12px;
  padding: 16px 20px;
  margin-top: 16px;
  font-size: 1rem;
  color: #e2e8f0;
  text-align: left;
  line-height: 2;
  font-family: 'JetBrains Mono', monospace;
  border: 1.5px solid #1e3a6e;
}
</style>
</head>
<body>

<div class="hero">
  <div class="flames" style="position:relative;z-index:1">
    <!-- kleine oranje vlam links -->
    <svg class="flame-svg small orange" viewBox="0 0 40 70" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 68 C8 55 2 44 6 32 C8 24 14 20 14 20 C12 30 18 34 20 28 C22 20 18 10 22 2 C28 12 32 22 30 34 C36 26 34 16 34 16 C42 28 36 48 20 68Z" fill="url(#og1)"/>
      <defs><linearGradient id="og1" x1="20" y1="2" x2="20" y2="68" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#fff7aa"/><stop offset="40%" stop-color="#f5a623"/><stop offset="100%" stop-color="#e8470a"/></linearGradient></defs>
    </svg>
    <!-- blauwe vlam midden -->
    <svg class="flame-svg blue" viewBox="0 0 44 76" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M22 74 C6 58 0 44 4 28 C7 16 14 10 14 10 C11 24 18 30 20 22 C23 12 19 4 24 0 C30 10 36 22 33 36 C40 26 37 14 37 14 C47 30 40 52 22 74Z" fill="url(#bl1)"/>
      <path d="M22 74 C10 60 8 48 12 36 C14 28 20 24 20 24 C18 32 22 36 24 30 C26 22 24 14 27 8 C32 18 34 30 30 40 C36 32 34 22 34 22 C40 34 36 54 22 74Z" fill="url(#bl2)" opacity="0.7"/>
      <defs>
        <linearGradient id="bl1" x1="22" y1="0" x2="22" y2="74" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#e0f2fe"/><stop offset="35%" stop-color="#38bdf8"/><stop offset="70%" stop-color="#1d6ef5"/><stop offset="100%" stop-color="#1e3a8a"/></linearGradient>
        <linearGradient id="bl2" x1="22" y1="8" x2="22" y2="74" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/><stop offset="100%" stop-color="#7dd3fc" stop-opacity="0.3"/></linearGradient>
      </defs>
    </svg>
    <!-- kleine oranje vlam rechts -->
    <svg class="flame-svg small orange" viewBox="0 0 40 70" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 68 C8 55 2 44 6 32 C8 24 14 20 14 20 C12 30 18 34 20 28 C22 20 18 10 22 2 C28 12 32 22 30 34 C36 26 34 16 34 16 C42 28 36 48 20 68Z" fill="url(#og2)"/>
      <defs><linearGradient id="og2" x1="20" y1="2" x2="20" y2="68" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#fff7aa"/><stop offset="40%" stop-color="#f5a623"/><stop offset="100%" stop-color="#e8470a"/></linearGradient></defs>
    </svg>
  </div>
  <h1>Verbrandings<span>reacties</span></h1>
  <p>Maak de reactievergelijking kloppend — kies de juiste coëfficiënten</p>
</div>

<!-- ── Naam scherm ── -->
<div id="name-screen">
  <div class="name-card">
    <h2>👋 Welkom!</h2>
    <p>Vul je naam in om te beginnen. Je score wordt opgeslagen op het scorebord.</p>
    <input class="name-input" id="name-input" type="text" placeholder="Jouw naam..." maxlength="30"
      oninput="document.getElementById('start-btn').disabled = this.value.trim().length < 2"
      onkeydown="if(event.key==='Enter') startQuiz()">
    <button class="start-btn" id="start-btn" onclick="startQuiz()" disabled>Start de quiz →</button>
  </div>
  <div class="leaderboard" id="leaderboard-home">
    <h3>🏆 Scorebord</h3>
    <div id="lb-list-home"><div class="lb-empty">Nog geen scores opgeslagen.</div></div>
    <button class="lb-clear" onclick="clearScores()">Scorebord wissen</button>
  </div>
</div>

<div id="quiz-wrapper" style="display:none">
<div class="phase-bar">
  <button class="phase-tab active" id="tab-vol" onclick="jumpPhase(0)">🔥 Volledig</button>
  <button class="phase-tab" id="tab-onvol" onclick="jumpPhase(1)">💨 Onvolledig</button>
</div>

<div class="main">
  <div class="progress-row">
    <span id="prog-text">Vraag 1 / 12</span>
    <span id="score-live">Score: 0</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="prog-fill" style="width:0%"></div>
  </div>

  <div id="quiz-area"></div>

  <div class="score-screen" id="score-screen">
    <div class="score-circle">
      <div class="score-big" id="final-num">0</div>
      <div class="score-sub">punten</div>
    </div>
    <div class="score-title" id="final-title">Goed gedaan!</div>
    <div class="score-msg" id="final-msg"></div>

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let allQ = [];        // flat list of all questions with phase info
let qIdx = 0;
let score = 0;
let blankStates = {}; // { blankId: { answered, correct } }
let blanksDone = 0;
let totalBlanks = 0;
let phaseScores = [0,0];
let phaseTotals = [0,0];

function buildAllQ() {
  allQ = [];
  PHASES.forEach((phase, pi) => {
    phase.questions.forEach((q, qi) => {
      allQ.push({ ...q, phaseIdx: pi, phaseLabel: phase.label, qiInPhase: qi });
    });
  });
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function fmtFormula(str) {
  // converts subscript unicode digits and regular digits after letters to <sub>
  return str
    .replace(/([A-Za-z])(\d+)/g, '$1<sub>$2</sub>')
    .replace(/([₀-₉]+)/g, m => '<sub>' + m.replace(/[₀-₉]/g, c => '₀₁₂₃₄₅₆₇₈₉'.indexOf(c)) + '</sub>');
}

function renderQuestion() {
  const area = document.getElementById('quiz-area');
  if (qIdx >= allQ.length) { showScore(); return; }

  const q = allQ[qIdx];
  const phase = PHASES[q.phaseIdx];
  const isIncomplete = q.phaseIdx === 1;
  const typeClass = isIncomplete ? 'incomplete' : '';

  // Reset blank states
  blankStates = {};
  blanksDone = 0;
  totalBlanks = q.blanks.length;
  q.blanks.forEach(b => { blankStates[b.id] = { selected: null, locked: false, hadError: false }; });

  // Phase intro for first question of each phase
  let introHTML = '';
  if (q.qiInPhase === 0) {
    introHTML = `
      <div class="phase-intro">
        <h2>${isIncomplete ? '💨' : '🔥'} ${phase.label}</h2>
        <p>${phase.intro}</p>
        <div class="rule-box">${phase.rule.replace(/\n/g,'<br>')}</div>
      </div>`;
  }

  // Build equation HTML
  const reactants = q.blanks.filter(b => b.role === 'reactant');
  const products  = q.blanks.filter(b => b.role === 'product');

  function termHTML(b) {
    const coeff = q.answers[b.id];
    const display = coeff === 1 ? '' : coeff; // don't show 1
    return `<span class="eq-term">
      <span class="eq-coeff blank" id="blank-${b.id}" data-id="${b.id}">?</span>
      <span class="eq-formula">${fmtFormula(b.formula)}</span>
    </span>`;
  }

  const reactHTML = reactants.map(termHTML).join('<span class="eq-plus"> + </span>');
  const prodHTML  = products.map(termHTML).join('<span class="eq-plus"> + </span>');

  // Build choices sections
  let choicesHTML = '';
  q.blanks.forEach(b => {
    const label = `coëfficiënt voor ${fmtFormula(b.formula)}`;
    const opts = q.options[b.id];
    const btns = opts.map(o =>
      `<button class="choice-btn" data-blank="${b.id}" data-val="${o}" onclick="handleChoice(this,'${b.id}',${o})">${o}</button>`
    ).join('');
    choicesHTML += `
      <div class="choices-group" id="group-${b.id}">
        <div class="choices-label">${label}</div>
        <div class="choices">${btns}</div>
      </div>`;
  });

  area.innerHTML = `
    ${introHTML}
    <div class="q-card">
      <div class="q-type-label ${typeClass}">${isIncomplete ? '💨 Onvolledige verbranding' : '🔥 Volledige verbranding'}</div>
      <div class="equation-wrap">
        <div class="equation">
          ${reactHTML}
          <span class="eq-arrow">→</span>
          ${prodHTML}
        </div>
      </div>
      <p class="q-instruction">Kies voor elk vraagteken de juiste coëfficiënt, daarna klik op <strong>Controleer</strong>.</p>
      ${choicesHTML}
      <button class="check-btn" id="check-btn" onclick="checkAll()" disabled>Controleer →</button>
      <div class="feedback-bar" id="feedback"></div>
      <div class="uitleg" id="uitleg"></div>
    </div>
    <div class="nav-row">
      <button class="nav-btn" onclick="prevQ()" ${qIdx === 0 ? 'disabled' : ''}>← Vorige</button>
      <button class="nav-btn primary" id="next-btn" onclick="nextQ()" disabled>Volgende →</button>
    </div>`;

  updateProgress();
  updateTabs();
}

function handleChoice(btn, blankId, val) {
  const b = blankStates[blankId];
  if (b.locked) return; // blank already correct, can't change

  const q = allQ[qIdx];

  // Deselect previously selected button for this blank
  document.querySelectorAll(`[data-blank="${blankId}"]`).forEach(el => {
    el.classList.remove('selected');
  });

  // Select this button
  btn.classList.add('selected');
  b.selected = val;

  // Update blank display to show chosen value
  const blankEl = document.getElementById(`blank-${blankId}`);
  blankEl.textContent = val;
  blankEl.classList.remove('answered-wrong');
  blankEl.classList.add('answered-pending');

  // Count how many blanks have a selection
  const allSelected = Object.values(blankStates).every(s => s.selected !== null || s.locked);
  document.getElementById('check-btn').disabled = !allSelected;
}

function checkAll() {
  const q = allQ[qIdx];
  let anyWrong = false;

  q.blanks.forEach(b => {
    const state = blankStates[b.id];
    if (state.locked) return; // already correct from previous check

    const correct = q.answers[b.id];
    const chosen = state.selected;
    const isCorrect = chosen === correct;
    const blankEl = document.getElementById(`blank-${b.id}`);

    if (isCorrect) {
      // Lock this blank as correct
      state.locked = true;
      state.hadError = state.hadError || false;
      blankEl.textContent = correct;
      blankEl.classList.remove('answered-pending', 'answered-wrong');
      blankEl.classList.add('answered-correct');

      // Mark the correct button green, disable all for this blank
      document.querySelectorAll(`[data-blank="${b.id}"]`).forEach(el => {
        el.disabled = true;
        el.classList.remove('selected');
        if (parseInt(el.dataset.val) === correct) el.classList.add('correct');
      });

      // Score: only if no prior error on this blank
      if (!state.hadError) {
        score++;
        document.getElementById('score-live').textContent = `Score: ${score}`;
        phaseScores[q.phaseIdx]++;
      }

    } else {
      // Wrong — mark red, reset for retry
      anyWrong = true;
      state.hadError = true;
      state.selected = null;
      blankEl.textContent = '?';
      blankEl.classList.remove('answered-pending', 'answered-correct');
      blankEl.classList.add('answered-wrong');

      // Flash selected button red, keep others available
      document.querySelectorAll(`[data-blank="${b.id}"]`).forEach(el => {
        el.classList.remove('selected');
        el.disabled = false;
        if (parseInt(el.dataset.val) === chosen) {
          el.classList.add('wrong');
          // Remove wrong class after animation
          setTimeout(() => el.classList.remove('wrong'), 1200);
        }
      });
    }
  });

  const checkBtn = document.getElementById('check-btn');
  const fb = document.getElementById('feedback');

  if (anyWrong) {
    fb.textContent = '✗ Niet helemaal — verbeter de rode coëfficiënten en probeer opnieuw.';
    fb.className = 'feedback-bar wrong';
    checkBtn.disabled = true; // disable until all blanks re-filled
  } else {
    // All correct!
    checkBtn.style.display = 'none';
    const allFirstTry = !Object.values(blankStates).some(s => s.hadError);
    fb.textContent = allFirstTry ? '✓ Perfect — reactie in één keer kloppend!' : '✓ Reactie klopt — goed volgehouden!';
    fb.className = 'feedback-bar correct';

    const uitleg = document.getElementById('uitleg');
    uitleg.innerHTML = `<strong>Uitleg:</strong> ${q.uitleg.replace(/\n/g,'<br>')}`;
    uitleg.classList.add('show');
    document.getElementById('next-btn').disabled = false;
  }
}

function nextQ() {
  qIdx++;
  renderQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function prevQ() {
  if (qIdx > 0) { qIdx--; renderQuestion(); }
}

function jumpPhase(pi) {
  const startIdx = pi === 0 ? 0 : PHASES[0].questions.length;
  qIdx = startIdx;
  renderQuestion();
}

function updateProgress() {
  const total = allQ.length;
  document.getElementById('prog-text').textContent = `Vraag ${qIdx + 1} / ${total}`;
  document.getElementById('prog-fill').style.width = ((qIdx) / total * 100) + '%';
}

function updateTabs() {
  const p0done = qIdx >= PHASES[0].questions.length;
  document.getElementById('tab-vol').className = 'phase-tab' + (qIdx < PHASES[0].questions.length ? ' active' : ' done');
  document.getElementById('tab-onvol').className = 'phase-tab' + (qIdx >= PHASES[0].questions.length && qIdx < allQ.length ? ' active' : (p0done && qIdx >= allQ.length ? ' done' : ''));
}

async function showScore() {
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('score-screen').classList.add('show');

  const maxScore = allQ.reduce((s,q) => s + q.blanks.length, 0);
  document.getElementById('final-num').textContent = score;
  document.getElementById('prog-text').textContent = 'Klaar!';
  document.getElementById('prog-fill').style.width = '100%';

  const pct = score / maxScore;
  const titles = ['Blijf oefenen! 💪', 'Goed bezig! 👍', 'Heel goed! 🎯', 'Uitstekend! 🏆'];
  const msgs = [
    'Herhaal de balanseringsregels en probeer opnieuw.',
    'Je begrijpt de basis — oefen nog wat met de coëfficiënten.',
    'Bijna perfect — een paar details te finetunen.',
    'Je kunt verbrandingsreacties feilloos balanceren!'
  ];
  const ti = pct < 0.5 ? 0 : pct < 0.7 ? 1 : pct < 0.9 ? 2 : 3;
  document.getElementById('final-title').textContent = titles[ti];
  document.getElementById('final-msg').textContent = msgs[ti];

  const p0total = PHASES[0].questions.reduce((s,q)=>s+q.blanks.length,0);
  const p1total = PHASES[1].questions.reduce((s,q)=>s+q.blanks.length,0);
  document.getElementById('breakdown').innerHTML = `
    <div class="breakdown-row"><span>🔥 Volledige verbranding</span><span>${phaseScores[0]} / ${p0total}</span></div>
    <div class="breakdown-row"><span>💨 Onvolledige verbranding</span><span>${phaseScores[1]} / ${p1total}</span></div>
    <div class="breakdown-row"><span><strong>Totaal</strong></span><span><strong>${score} / ${maxScore}</strong></span></div>`;

  // Save score and render leaderboard
  await saveScore(score, maxScore);
  renderLeaderboard('lb-list-end');
}

function restart() {
  qIdx = 0; score = 0; phaseScores = [0,0];
  document.getElementById('score-live').textContent = `Score: 0 — ${currentName}`;
  document.getElementById('score-screen').classList.remove('show');
  document.getElementById('quiz-area').style.display = '';
  renderQuestion();
}

function goHome() {
  document.getElementById('quiz-wrapper').style.display = 'none';
  document.getElementById('name-screen').style.display = '';
  renderLeaderboard('lb-list-home');
}

const JSONBIN_ID  = '69d8ed0436566621a89b0146';       // bijv. 6650abc123def456
const JSONBIN_KEY = '$2a$10$MyGVM0ANs86vLveZMzFVX.WbFi8bK7nUBz5RNV20fv707j4LkmEZO';    // bijv. $2a$10$...

let currentName = '';
let cachedScores = [];

async function fetchScores() {
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}/latest`, {
      headers: { 'X-Master-Key': JSONBIN_KEY }
    });
    const data = await res.json();
    cachedScores = Array.isArray(data.record?.scores) ? data.record.scores : [];
  } catch (e) {
    console.warn('Scorebord ophalen mislukt:', e);
    cachedScores = [];
  }
  return cachedScores;
}

async function saveScore(sc, max) {
  const pct = Math.round(sc / max * 100);
  const entry = { name: currentName, score: sc, max, pct, date: new Date().toLocaleDateString('nl-NL') };

  let scores = await fetchScores();
  const best = {};
  [...scores, entry].forEach(s => {
    if (!best[s.name] || s.pct > best[s.name].pct) best[s.name] = s;
  });
  const sorted = Object.values(best).sort((a,b) => b.pct - a.pct || b.score - a.score);

  try {
    await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY },
      body: JSON.stringify({ scores: sorted })
    });
    cachedScores = sorted;
  } catch (e) {
    console.warn('Score opslaan mislukt:', e);
  }
}

function renderLeaderboard(containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;
  const scores = cachedScores;
  if (!scores || scores.length === 0) {
    el.innerHTML = '<div class="lb-empty">Nog geen scores opgeslagen.</div>';
    return;
  }
  const medals = ['🥇','🥈','🥉'];
  const rankClass = ['gold','silver','bronze'];
  el.innerHTML = scores.map((s, i) => {
    const isMe = s.name === currentName;
    const medal = i < 3 ? medals[i] : `${i+1}.`;
    const rc = i < 3 ? rankClass[i] : '';
    return `<div class="lb-row ${rc}">
      <span class="lb-rank">${medal}</span>
      <span class="lb-name ${isMe ? 'me' : ''}">${s.name}${isMe ? ' ← jij' : ''}</span>
      <span class="lb-score">${s.score}/${s.max}</span>
      <span class="lb-pct">${s.pct}%</span>
    </div>`;
  }).join('');
}

async function clearScores() {
  if (!confirm('Scorebord wissen voor alle leerlingen?')) return;
  try {
    await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY },
      body: JSON.stringify({ scores: [] })
    });
    cachedScores = [];
    renderLeaderboard('lb-list-home');
  } catch (e) { alert('Wissen mislukt.'); }
}

function startQuiz() {
  const name = document.getElementById('name-input').value.trim();
  if (name.length < 2) return;
  currentName = name;
  document.getElementById('name-screen').style.display = 'none';
  document.getElementById('quiz-wrapper').style.display = '';
  document.getElementById('score-live').textContent = `Score: 0 — ${currentName}`;
  buildAllQ();
  PHASES.forEach((ph, pi) => {
    phaseTotals[pi] = ph.questions.reduce((s,q)=>s+q.blanks.length,0);
  });
  qIdx = 0; score = 0; phaseScores = [0,0];
  renderQuestion();
}

function goHome() {
  document.getElementById('quiz-wrapper').style.display = 'none';
  document.getElementById('name-screen').style.display = '';
  fetchScores().then(() => renderLeaderboard('lb-list-home'));
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
buildAllQ();
PHASES.forEach((ph, pi) => {
  phaseTotals[pi] = ph.questions.reduce((s,q)=>s+q.blanks.length,0);
});

// Load leaderboard on startup
document.getElementById('lb-list-home').innerHTML = '<div class="lb-empty">Scorebord laden...</div>';
fetchScores().then(() => renderLeaderboard('lb-list-home'));
</script>
